<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva en Restaurante</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        form {
            width: 300px;
            margin: 0 auto;
        }
        input, button {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 10px;
            font-size: 16px;
        }
        button:disabled {
            background-color: grey;
        }
    </style>
</head>
<body>

    <h2>Formulario de Reserva</h2>

    <form id="reservaForm">
        <label for="nombre">Nombre Completo:</label>
        <input type="text" id="nombre" name="nombre" required>

        <label for="telefono">Teléfono:</label>
        <input type="tel" id="telefono" name="telefono" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="fecha">Fecha de Reserva:</label>
        <input type="date" id="fecha" name="fecha" required>

        <label for="hora">Hora de Reserva:</label>
        <input type="time" id="hora" name="hora" required>

        <label for="personas">Número de Personas:</label>
        <input type="number" id="personas" name="personas"  required>

        <button type="submit" id="submitBtn" disabled>Enviar Reserva</button>
    </form>

    <script>
        const form = document.getElementById('reservaForm');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('input', function() {
            // Chequea si todos los campos son válidos
            if (form.checkValidity()) {
                submitBtn.disabled = true;
            } else {
                submitBtn.disabled = false;
            }
        });

        form.addEventListener('submit', function(event) {
            event.preventDefault(); // Evita que el formulario se envíe sin hacer nada

            // Aquí puedes agregar la lógica para enviar los datos al servidor
            alert('Reserva enviada con éxito.');
        });
    </script>

</body>
</html>
